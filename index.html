<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Hub NL</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f1115;
    color:#e6e6e6;
}

header{
    background:#161a22;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    border-bottom:1px solid #2a2f3a;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1f29;
    border-radius:10px;
    padding:18px;
    margin-bottom:14px;
    border:1px solid #2b3240;
    transition:0.2s;
}

.card:hover{
    background:#222836;
    transform:scale(1.02);
}

a{
    text-decoration:none;
    color:#6ab0ff;
    font-size:18px;
}

.desc{
    font-size:13px;
    color:#9aa3b2;
}

footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#6b7280;
}
</style>
</head>

<body>
<div style="position: fixed; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 1000;">

  <!-- GitHub Link -->
  <a href="https://github.com/Mark-609/IPTV-IPRadio-Netherlands" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
         alt="GitHub"
         style="width:32px;height:32px;">
  </a>

  <!-- Reddit Link -->
  <a href="https://www.reddit.com/r/All_in_one_IPTV/" target="_blank">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg"
         alt="Reddit"
         style="width:32px;height:32px; filter: invert(36%) sepia(98%) saturate(7492%) hue-rotate(2deg) brightness(102%) contrast(107%);">
  </a>

</div>
<header>
IPTV Hub NL
</header>

<div class="container">

<div class="card">
<a href="all-in-one.m3u" target="_blank">All Channels</a>
<div class="desc">Combined IPTV playlist</div>
</div>

<div class="card">
<a href="NpoTV.m3u" target="_blank">NPO TV</a>
<div class="desc">Dutch public TV channels</div>
</div>

<div class="card">
<a href="NpoRadio.m3u" target="_blank">NPO Radio</a>
<div class="desc">Dutch public radio stations</div>
</div>

<div class="card">
<a href="RPT.m3u" target="_blank">Regional Public TV</a>
<div class="desc">Regional television stations</div>
</div>

<div class="card">
<a href="RPR.m3u" target="_blank">Regional Public Radio</a>
<div class="desc">Regional radio stations</div>
</div>

</div>

<footer>
IPTV Hub NL
</footer>

</body>
</html>
